<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Authenticating...</title></head>
<body>
<p style="font-family:sans-serif;text-align:center;margin-top:40px;color:#666">Authenticating, please wait...</p>
<script>
(async function() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const state = params.get('state');

  if (!code) { document.body.innerHTML = '<p style="color:red;text-align:center;margin-top:40px">Error: no code received</p>'; return; }

  try {
    const res = await fetch('/api/auth/callback?code=' + code + '&state=' + state);
    const data = await res.json();
    if (data.token) {
      if (window.opener) {
        window.opener.postMessage({ type: 'github-token', token: data.token }, window.location.origin);
        window.close();
      } else {
        localStorage.setItem('gh_token', data.token);
        window.location.href = '/admin/';
      }
    } else {
      document.body.innerHTML = '<p style="color:red;text-align:center;margin-top:40px">Auth failed: ' + JSON.stringify(data) + '</p>';
    }
  } catch(e) {
    document.body.innerHTML = '<p style="color:red;text-align:center;margin-top:40px">Error: ' + e.message + '</p>';
  }
})();
</script>
</body>
</html>
