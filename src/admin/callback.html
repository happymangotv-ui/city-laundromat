<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Authenticating...</title></head>
<body>
<p id="status" style="font-family:sans-serif;text-align:center;margin-top:40px;color:#666">Authenticating, please wait...</p>
<pre id="debug" style="font-family:monospace;font-size:12px;max-width:600px;margin:20px auto;background:#f5f5f5;padding:16px;border-radius:8px;display:none;word-break:break-all"></pre>
<script>
(async function() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const debug = document.getElementById('debug');
  const status = document.getElementById('status');

  function showError(msg, detail) {
    status.style.color = 'red';
    status.textContent = msg;
    if (detail) {
      debug.style.display = 'block';
      debug.textContent = detail;
    }
  }

  if (!code) {
    showError('Error: no code received from GitHub.');
    return;
  }

  try {
    const res = await fetch('/api/auth/callback?code=' + encodeURIComponent(code));
    const raw = await res.text();

    let data;
    try { data = JSON.parse(raw); } catch(e) {
      showError('Error: bad response from auth server.', 'Status: ' + res.status + '\n\n' + raw);
      return;
    }

    if (data.access_token) {
      localStorage.setItem('gh_token', data.access_token);
      window.location.href = '/admin/';
    } else {
      showError('Auth failed — no token returned.', JSON.stringify(data, null, 2));
    }
  } catch(e) {
    showError('Network error: ' + e.message);
  }
})();
</script>
</body>
</html>
