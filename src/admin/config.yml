backend:
  name: github
  repo: happymangotv-ui/city-laundromat
  branch: main
  auth_type: pkce

media_folder: src/images
public_folder: /images

collections:
  - name: settings
    label: Business Settings
    files:
      - name: business
        label: Business Info
        file: _data/business.json
        format: json
        fields:
          - { label: "Business Name", name: name, widget: string }
          - { label: "Phone Number", name: phone, widget: string }
          - { label: "Phone (digits only)", name: phone_raw, widget: string }
          - { label: "Email", name: email, widget: string }
          - { label: "Street Address", name: address, widget: string }
          - { label: "City", name: city, widget: string }
          - { label: "State", name: state, widget: string }
          - { label: "Zip Code", name: zip, widget: string }
          - { label: "Full Address (displayed)", name: full_address, widget: string }
          - { label: "Hours", name: hours, widget: string }
          - { label: "Pickup Hours", name: pickup_hours, widget: string }
          - { label: "Tagline", name: tagline, widget: string }
          - { label: "Booking URL", name: booking_url, widget: string }
          - { label: "Commercial Phone", name: commercial_phone, widget: string }
          - { label: "Commercial Phone (digits only)", name: commercial_phone_raw, widget: string }
          - label: "Prices"
            name: prices
            widget: object
            fields:
              - { label: "Wash & Fold ($/lb)", name: wash_fold, widget: string }
              - { label: "Rush Service ($/lb)", name: rush, widget: string }
              - { label: "Self-Serve ($/wash)", name: self_serve, widget: string }
          - label: "Service Areas"
            name: service_areas
            widget: list
            field: { label: Area, name: area, widget: string }
