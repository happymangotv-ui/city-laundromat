<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site Editor – The City Laundry</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #111; }
    .topbar { background: #111827; color: #fff; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
    .topbar h1 { font-size: 15px; font-weight: 600; }
    .topbar span { font-size: 13px; color: #aaa; }
    #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #111827; }
    .login-card { background: #1e2535; border-radius: 16px; padding: 48px 40px; text-align: center; max-width: 380px; width: 100%; }
    .login-card h2 { color: #fff; font-size: 22px; margin-bottom: 8px; }
    .login-card p { color: #aaa; font-size: 14px; margin-bottom: 32px; }
    .btn-github { display: inline-flex; align-items: center; gap: 10px; background: #2d7d6e; color: #fff; border: none; padding: 14px 28px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; text-decoration: none; transition: background 0.2s; }
    .btn-github:hover { background: #256860; }
    #editor-screen { display: none; max-width: 720px; margin: 32px auto; padding: 0 16px 80px; }
    .card { background: #fff; border-radius: 12px; padding: 28px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .card h2 { font-size: 16px; font-weight: 700; margin-bottom: 20px; color: #111; border-bottom: 1px solid #eee; padding-bottom: 12px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 12px; font-weight: 600; color: #666; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
    .field input { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 10px 12px; font-size: 14px; color: #111; transition: border 0.2s; }
    .field input:focus { outline: none; border-color: #2d7d6e; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .save-btn { position: fixed; bottom: 24px; right: 24px; background: #2d7d6e; color: #fff; border: none; padding: 14px 28px; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 16px rgba(45,125,110,0.4); transition: background 0.2s; }
    .save-btn:hover { background: #256860; }
    .save-btn:disabled { background: #aaa; cursor: not-allowed; }
    .toast { position: fixed; bottom: 80px; right: 24px; background: #111; color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 14px; display: none; }
    .logout-btn { background: none; border: 1px solid #555; color: #aaa; padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; }
    .logout-btn:hover { border-color: #aaa; color: #fff; }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h2>Site Editor</h2>
    <p>The City Laundry<br>Sign in to edit your website content</p>
    <a id="login-btn" href="#" class="btn-github">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
      Sign in with GitHub
    </a>
  </div>
</div>

<div id="editor-screen">
  <div class="topbar">
    <h1>Site Editor — The City Laundry</h1>
    <div style="display:flex;align-items:center;gap:12px">
      <span id="user-name"></span>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>
  </div>
  <br>

  <div class="card">
    <h2>Contact Info</h2>
    <div class="row">
      <div class="field"><label>Phone Number</label><input id="phone" type="text" placeholder="(347) 758-7966"></div>
      <div class="field"><label>Email</label><input id="email" type="text" placeholder="Uticalaundry@gmail.com"></div>
    </div>
    <div class="field"><label>Full Address (displayed on site)</label><input id="full_address" type="text" placeholder="391 Brook Ave, Bronx NY 10454"></div>
  </div>

  <div class="card">
    <h2>Hours</h2>
    <div class="field"><label>Business Hours</label><input id="hours" type="text" placeholder="Mon–Sun: 7am – 10pm"></div>
    <div class="field"><label>Pickup Hours</label><input id="pickup_hours" type="text" placeholder="7AM–8PM"></div>
  </div>

  <div class="card">
    <h2>Pricing</h2>
    <div class="row">
      <div class="field"><label>Wash & Fold ($/lb)</label><input id="price_wash_fold" type="text" placeholder="1.25"></div>
      <div class="field"><label>Rush Service ($/lb)</label><input id="price_rush" type="text" placeholder="1.40"></div>
    </div>
    <div class="row">
      <div class="field"><label>Self-Serve ($/wash)</label><input id="price_self_serve" type="text" placeholder="2.69"></div>
      <div class="field"></div>
    </div>
  </div>

  <div class="card">
    <h2>Booking</h2>
    <div class="field"><label>Booking URL</label><input id="booking_url" type="text" placeholder="https://app.trycents.com/..."></div>
  </div>

  <div class="card">
    <h2>Hero Image</h2>

    <!-- Current image preview -->
    <div id="current-preview" style="margin-bottom:20px;display:none">
      <label style="display:block;font-size:12px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Current Image</label>
      <img id="current-img" style="height:160px;width:100%;object-fit:cover;border-radius:10px;border:1px solid #eee" />
    </div>

    <!-- Same image toggle -->
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;padding:14px;background:#f9f9f9;border-radius:8px;border:1px solid #eee">
      <input type="checkbox" id="same_image" style="width:16px;height:16px;cursor:pointer" checked>
      <label for="same_image" style="font-size:14px;color:#333;cursor:pointer;font-weight:500">Use the same hero image on all pages</label>
    </div>

    <div class="field">
      <label>Upload New Photo</label>
      <input type="file" id="hero_upload" accept="image/*" style="padding:8px 0;font-size:14px;color:#333">
      <div id="upload-preview" style="margin-top:10px;display:none">
        <img id="preview-img" style="height:120px;border-radius:8px;object-fit:cover" />
        <p id="upload-status" style="font-size:12px;color:#2d7d6e;margin-top:6px"></p>
      </div>
    </div>
    <div class="field" style="margin-top:8px">
      <label style="color:#aaa;font-size:11px">Or paste an image URL directly</label>
      <input id="hero_image" type="text" placeholder="https://..." style="margin-top:4px">
    </div>
  </div>

  <div class="card">
    <h2>Commercial</h2>
    <div class="field"><label>Commercial Phone</label><input id="commercial_phone" type="text" placeholder="(917) 825-9176"></div>
  </div>
</div>

<button class="save-btn" id="save-btn" onclick="save()" style="display:none">Save Changes →</button>
<div class="toast" id="toast"></div>

<script>
const REPO = 'happymangotv-ui/city-laundromat';
const FILE = '_data/business.json';
const CLIENT_ID = 'Ov23li3hC0uz0PlaIhLE';
const REDIRECT_URI = window.location.origin + '/admin/callback.html';

let token = localStorage.getItem('gh_token');
let fileSha = '';

function logout() {
  localStorage.removeItem('gh_token');
  token = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('editor-screen').style.display = 'none';
  document.getElementById('save-btn').style.display = 'none';
}

document.getElementById('login-btn').addEventListener('click', function(e) {
  e.preventDefault();
  const state = Math.random().toString(36).slice(2);
  sessionStorage.setItem('oauth_state', state);
  const params = new URLSearchParams({
    client_id: CLIENT_ID,
    redirect_uri: REDIRECT_URI,
    scope: 'repo',
    state
  });
  window.open(`https://github.com/login/oauth/authorize?${params}`, 'github-oauth', 'width=600,height=700,left=200,top=100');
});

window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'github-token') {
    token = e.data.token;
    localStorage.setItem('gh_token', token);
    init();
  }
});

async function init() {
  if (!token) return;
  try {
    const userRes = await fetch('https://api.github.com/user', { headers: { Authorization: `token ${token}` } });
    if (!userRes.ok) { logout(); return; }
    const user = await userRes.json();
    document.getElementById('user-name').textContent = user.login;
    const fileRes = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, { headers: { Authorization: `token ${token}` } });
    const fileData = await fileRes.json();
    fileSha = fileData.sha;
    const data = JSON.parse(decodeURIComponent(escape(atob(fileData.content.replace(/\n/g, '')))));
    document.getElementById('phone').value = data.phone || '';
    document.getElementById('email').value = data.email || '';
    document.getElementById('full_address').value = data.full_address || '';
    document.getElementById('hours').value = data.hours || '';
    document.getElementById('pickup_hours').value = data.pickup_hours || '';
    document.getElementById('price_wash_fold').value = data.prices?.wash_fold || '';
    document.getElementById('price_rush').value = data.prices?.rush || '';
    document.getElementById('price_self_serve').value = data.prices?.self_serve || '';
    document.getElementById('booking_url').value = data.booking_url || '';
    document.getElementById('hero_image').value = data.hero_image || '';
    // Show current image preview
    if (data.hero_image) {
      const img = document.getElementById('current-img');
      img.src = data.hero_image;
      img.onerror = () => { document.getElementById('current-preview').style.display = 'none'; };
      img.onload = () => { document.getElementById('current-preview').style.display = 'block'; };
      img.src = data.hero_image; // trigger load
    }
    document.getElementById('same_image').checked = data.same_hero_image !== false;
    document.getElementById('commercial_phone').value = data.commercial_phone || '';
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('editor-screen').style.display = 'block';
    document.getElementById('save-btn').style.display = 'block';
  } catch(err) { logout(); }
}

async function save() {
  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.textContent = 'Saving...';
  try {
    const fileRes = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, { headers: { Authorization: `token ${token}` } });
    const fileData = await fileRes.json();
    const current = JSON.parse(decodeURIComponent(escape(atob(fileData.content.replace(/\n/g, '')))));
    current.phone = document.getElementById('phone').value;
    current.phone_raw = document.getElementById('phone').value.replace(/\D/g,'');
    current.email = document.getElementById('email').value;
    current.full_address = document.getElementById('full_address').value;
    current.hours = document.getElementById('hours').value;
    current.pickup_hours = document.getElementById('pickup_hours').value;
    current.prices.wash_fold = document.getElementById('price_wash_fold').value;
    current.prices.rush = document.getElementById('price_rush').value;
    current.prices.self_serve = document.getElementById('price_self_serve').value;
    current.booking_url = document.getElementById('booking_url').value;
    // Auto-convert Google Drive share link to direct image URL
    let heroImg = document.getElementById('hero_image').value.trim();
    const driveMatch = heroImg.match(/\/d\/([a-zA-Z0-9_-]{10,})/);
    if (driveMatch) {
      heroImg = `https://drive.google.com/thumbnail?id=${driveMatch[1]}&sz=w1200`;
    }
    current.hero_image = heroImg;
    current.same_hero_image = document.getElementById('same_image').checked;
    current.commercial_phone = document.getElementById('commercial_phone').value;
    current.commercial_phone_raw = document.getElementById('commercial_phone').value.replace(/\D/g,'');
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(current, null, 2))));
    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, {
      method: 'PUT',
      headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: 'Update business info via admin panel', content, sha: fileData.sha })
    });
    if (res.ok) { showToast('✅ Saved! Site will update in ~30 seconds.'); }
    else { showToast('❌ Save failed. Try again.'); }
  } catch(e) { showToast('❌ Error saving. Check connection.'); }
  btn.disabled = false;
  btn.textContent = 'Save Changes →';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 4000);
}

// Image upload handler
document.getElementById('hero_upload').addEventListener('change', async function(e) {
  const file = e.target.files[0];
  if (!file) return;
  
  const preview = document.getElementById('upload-preview');
  const previewImg = document.getElementById('preview-img');
  const status = document.getElementById('upload-status');
  
  // Show preview
  previewImg.src = URL.createObjectURL(file);
  preview.style.display = 'block';
  status.textContent = 'Uploading...';
  status.style.color = '#888';
  
  try {
    // Convert to base64
    const base64 = await new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (e) => resolve(e.target.result.split(',')[1]);
      reader.readAsDataURL(file);
    });
    
    const ext = file.name.split('.').pop().toLowerCase();
    const filename = `hero.${ext}`;
    const path = `src/images/${filename}`;
    
    // Check if file exists to get SHA
    let sha = '';
    const check = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
      headers: { Authorization: `token ${token}` }
    });
    if (check.ok) {
      const existing = await check.json();
      sha = existing.sha;
    }
    
    // Upload to GitHub
    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
      method: 'PUT',
      headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: 'Update hero image via admin panel',
        content: base64,
        ...(sha && { sha })
      })
    });
    
    if (res.ok) {
      const imgPath = `/images/${filename}`;
      document.getElementById('hero_image').value = imgPath;
      document.getElementById('current-img').src = previewImg.src;
      document.getElementById('current-preview').style.display = 'block';
      status.textContent = '✅ Uploaded! Hit Save Changes to apply.';
      status.style.color = '#2d7d6e';
    } else {
      status.textContent = '❌ Upload failed. Try again.';
      status.style.color = 'red';
    }
  } catch(err) {
    status.textContent = '❌ Error: ' + err.message;
    status.style.color = 'red';
  }
});

if (token) init();
</script>
</body>
</html>
