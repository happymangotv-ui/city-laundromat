{% extends "base.njk" %}
{% set title = "Schedule a Pickup – The City Laundromat" %}
{% set description = "Schedule laundry pickup online." %}

{% block content %}
<section style="padding:0;min-height:100vh;background:#0d1a13;">
  <div style="max-width:900px;margin:0 auto;text-align:center;padding:40px 20px 20px;">
    <div style="font-size:0.75rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:10px;">Book Online</div>
    <h2 style="font-family:'Playfair Display',Georgia,serif;font-size:2rem;color:#fff;margin-bottom:8px;">Schedule Your Pickup</h2>
    <p style="color:rgba(255,255,255,0.6);font-size:0.95rem;">Fill out the form below and we'll handle the rest.</p>
  </div>
  <iframe
    src="{{ business.booking_url }}"
    style="width:100%;height:820px;border:none;display:block;"
    allow="payment"
    loading="eager"
    title="Schedule Pickup – The City Laundromat"
  ></iframe>
</section>
{% endblock %}
